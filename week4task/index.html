<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <marquee><h2>WELCOME TO MY PROFILE PAGE</h2></marquee>
    <header>
        <h1>Hemavarshini</h1>

        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Main -->
    <main>

        <!-- About Section -->
        <section id="about" class="about">

           <div class="about-image">
                <img src="profile.jpg" alt="Profile Image">
            </div>
            <div class="about-text">
                <h2>About Me</h2>

                <p>
                    Hello! I'm <strong>Hemavarshini</strong>.
                </p>

                <p>
                    I am currently learning Python, FastAPI,
                    SQL, HTML, CSS and Web Development.
                </p>

                <p>
                    My goal is to become a Full Stack Developer.
                </p>

            </div>

        </section>

        <!-- Skills -->
        <section id="skills">

            <h2>My Skills</h2>

            <div class="skills">

                <div class="skill-card">Python</div>

                <div class="skill-card">FastAPI</div>

                <div class="skill-card">SQL</div>

                <div class="skill-card">HTML</div>

                <div class="skill-card">CSS</div>

                <div class="skill-card">Git</div>

            </div>

        </section>

        <!-- Contact -->
        <section id="contact">

            <h2>Contact Me</h2>

            <form>

                <label>Name</label>
                <input type="text" placeholder="Enter your name">

                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <label>Message</label>
                <textarea rows="5" placeholder="Write your message"></textarea>

                <button type="submit">Send</button>

            </form>

        </section>

    </main>

    <!-- Footer -->
    <footer>

        <p>© 2026 Hemavarshini</p>

    </footer>

</body>
</html>
